name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-first-checklist-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}

      - name: Compile sources
        run: python -m compileall -q local_first_checklist tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Install package
        run: python -m pip install .

      - name: Smoke test installed CLI
        run: |
          local-first-checklist --data smoke-tasks.json add "CI smoke test"
          local-first-checklist --data smoke-tasks.json done 1
          local-first-checklist --data smoke-tasks.json doctor
          local-first-checklist --data smoke-tasks.json --json list --all
